<section class="event-detail-page page-container">
  <a class="eyebrow-link" routerLink="/events">
    <span aria-hidden="true">←</span>
    Voltar para eventos
  </a>

  <div class="loading-container" *ngIf="isLoading">
    <mat-spinner diameter="48"></mat-spinner>
    <span>Carregando detalhes...</span>
  </div>

  <p class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</p>

  <article *ngIf="event && !isLoading">
    <div class="detail-heading">
      <div>
        <h1 class="page-title">{{ event.title }}</h1>
        <div class="event-meta">
          <span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7 2v3M17 2v3M3.5 9h17M5.5 4h13a2 2 0 0 1 2 2v13a2 2 0 0 1-2 2h-13a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/>
            </svg>
            {{ event.eventDateTime | date: 'dd/MM/yyyy' }}
          </span>
          <span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="9"/>
              <path d="M12 7v5l3 2"/>
            </svg>
            {{ event.eventDateTime | date: 'HH:mm' }}
          </span>
          <span>
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 10c0 5-8 11-8 11S4 15 4 10a8 8 0 1 1 16 0Z"/>
              <circle cx="12" cy="10" r="2.5"/>
            </svg>
            {{ event.location }}
          </span>
        </div>
      </div>

      <div class="detail-actions">
        <a mat-raised-button color="primary" [routerLink]="['/events', event.id, 'edit']">Editar</a>
        <button mat-stroked-button class="delete-button" type="button" [disabled]="isDeleting"
          (click)="deleteEvent()">
          {{ isDeleting ? 'Excluindo...' : 'Excluir' }}
        </button>
      </div>
    </div>

    <div class="description-section">
      <h2>Descrição</h2>
      <p>{{ event.description || 'Este evento não possui descrição.' }}</p>
    </div>
  </article>
</section>
