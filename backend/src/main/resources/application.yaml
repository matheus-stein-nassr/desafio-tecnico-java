server:
  port: 8080

spring:
  application:
    name: event-management

  datasource:
    url: jdbc:postgresql://localhost:5433/eventdb
    username: postgres
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration